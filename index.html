<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omni Sales Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background:#f7f8fb; }
    .card-soft { border:none; border-radius:20px; box-shadow:0 4px 18px rgba(0,0,0,.06); }
    .local-btn.active { font-weight:700; }
    canvas { max-height:300px; }
  </style>
</head>
<body>
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h1 class="h3 mb-1">Omni Sales Manager</h1>
      <small class="text-muted">Control de Aldrey y Gallegos</small>
    </div>
    <div class="btn-group">
      <button class="btn btn-outline-dark local-btn" onclick="setLocal('aldrey')">Aldrey</button>
      <button class="btn btn-outline-dark local-btn" onclick="setLocal('gallegos')">Gallegos</button>
    </div>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-md-4"><div class="card card-soft p-3"><small>Facturación</small><h3 id="kpiMoney">$0</h3></div></div>
    <div class="col-md-4"><div class="card card-soft p-3"><small>Unidades</small><h3 id="kpiUnits">0</h3></div></div>
    <div class="col-md-4"><div class="card card-soft p-3"><small>Ticket promedio</small><h3 id="kpiTicket">$0</h3></div></div>
  </div>

  <div class="card card-soft p-3 mb-4">
    <h5>Nueva venta</h5>
    <div class="row g-2">
      <div class="col-md-2"><input id="fDate" type="date" class="form-control"></div>
      <div class="col-md-2"><input id="fVendor" placeholder="Vendedor" class="form-control"></div>
      <div class="col-md-2"><input id="fAmount" placeholder="Monto" type="number" class="form-control"></div>
      <div class="col-md-2"><input id="fUnits" placeholder="Unidades" type="number" class="form-control"></div>
      <div class="col-md-2"><input id="fClients" placeholder="Clientes" type="number" class="form-control"></div>
      <div class="col-md-2"><button class="btn btn-dark w-100" onclick="addSale()">Guardar</button></div>
    </div>
  </div>

  <div class="row g-4">
    <div class="col-lg-7">
      <div class="card card-soft p-3">
        <table class="table" id="salesTable">
          <thead><tr><th>Fecha</th><th>Vendedor</th><th>Monto</th><th>Unid.</th><th></th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
    <div class="col-lg-5">
      <div class="card card-soft p-3">
        <canvas id="salesChart"></canvas>
      </div>
    </div>
  </div>
</div>

<script>
const DB_KEY = 'omni_sales_v2';
const state = {
  local: localStorage.getItem('lastLocal') || 'aldrey',
  db: JSON.parse(localStorage.getItem(DB_KEY)) || { sales: [] },
  chart: null
};

function saveDB(){
  localStorage.setItem(DB_KEY, JSON.stringify(state.db));
  localStorage.setItem('lastLocal', state.local);
}

function setLocal(local){
  state.local = local;
  saveDB();
  render();
}

function addSale(){
  state.db.sales.push({
    id: Date.now(),
    local: state.local,
    date: document.getElementById('fDate').value,
    vendor: document.getElementById('fVendor').value,
    amount: Number(document.getElementById('fAmount').value || 0),
    units: Number(document.getElementById('fUnits').value || 0),
    clients: Number(document.getElementById('fClients').value || 1)
  });
  saveDB();
  render();
}

function removeSale(id){
  state.db.sales = state.db.sales.filter(x => x.id !== id);
  saveDB();
  render();
}

function render(){
  document.querySelectorAll('.local-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.toLowerCase() === state.local);
  });

  const sales = state.db.sales.filter(x => x.local === state.local);

  const money = sales.reduce((a,b) => a + b.amount, 0);
  const units = sales.reduce((a,b) => a + b.units, 0);
  const clients = sales.reduce((a,b) => a + b.clients, 0);

  document.getElementById('kpiMoney').textContent = '$' + money.toLocaleString();
  document.getElementById('kpiUnits').textContent = units;
  document.getElementById('kpiTicket').textContent = '$' + (clients ? Math.round(money/clients) : 0).toLocaleString();

  document.querySelector('#salesTable tbody').innerHTML = sales.slice().reverse().map(s => `
    <tr>
      <td>${s.date}</td>
      <td>${s.vendor}</td>
      <td>$${s.amount.toLocaleString()}</td>
      <td>${s.units}</td>
      <td><button class="btn btn-sm btn-outline-danger" onclick="removeSale(${s.id})">X</button></td>
    </tr>
  `).join('');

  const vendorMap = {};
  sales.forEach(s => vendorMap[s.vendor] = (vendorMap[s.vendor] || 0) + s.amount);

  const ctx = document.getElementById('salesChart');
  if(state.chart) state.chart.destroy();

  state.chart = new Chart(ctx, {
    type:'bar',
    data:{
      labels:Object.keys(vendorMap),
      datasets:[{ data:Object.values(vendorMap) }]
    },
    options:{ plugins:{ legend:{ display:false } } }
  });
}

render();
</script>
</body>
</html>
